[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tracepilot-agent"
version = "0.1.0"
description = "LangGraph multi-agent orchestration for grounded code intelligence"
requires-python = ">=3.11"
dependencies = [
    "tracepilot-shared",
    "tracepilot-prompts",
    "tracepilot-retrieval",
    "tracepilot-tooling",
    "langgraph>=0.2.30,<0.3",
    "langchain-core>=0.3,<0.4",
    "langchain-ollama>=0.2,<0.4",
    "httpx>=0.27,<0.29",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["tracepilot_agent*"]
